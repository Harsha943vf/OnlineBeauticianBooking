spring.application.name=booking-system

# Server
server.port=${PORT:8080}

# MySQL (Railway auto-provides MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:beautician_booking_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS (comma-separated for multiple origins)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# JWT
app.jwt.secret=${JWT_SECRET:YmVhdXRpY2lhbmJvb2tpbmdzZWNyZXRrZXkyMDI2c3ByaW5nYm9vdGp3dHRva2Vu}
app.jwt.expiration-ms=86400000

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:your-email@gmail.com}
