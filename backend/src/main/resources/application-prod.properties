spring.application.name=booking-system

# Server
server.port=${PORT:8080}

# MySQL - Set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD as env vars in Railway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/beautician_booking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool - tolerate slow DB startup
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS (comma-separated for multiple origins)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# JWT
app.jwt.secret=${JWT_SECRET:YmVhdXRpY2lhbmJvb2tpbmdzZWNyZXRrZXkyMDI2c3ByaW5nYm9vdGp3dHRva2Vu}
app.jwt.expiration-ms=86400000

# Email (Gmail SMTP) - autoconfigure only if credentials provided
spring.autoconfigure.exclude=${MAIL_EXCLUDE:}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
app.mail.from=${MAIL_USERNAME:noreply@example.com}
