services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Bittu1302
      MYSQL_DATABASE: beautician_booking_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/beautician_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Bittu1302
      APP_CORS_ALLOWED_ORIGINS: http://localhost
      APP_JWT_SECRET: YmVhdXRpY2lhbmJvb2tpbmdzZWNyZXRrZXkyMDI2c3ByaW5nYm9vdGp3dHRva2Vu
      APP_JWT_EXPIRATION_MS: 86400000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
